<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIGSO — Nueva solicitud</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/formulario.css" />
</head>
<body>
  <header id="sigso-header" class="sigso-header"></header>

  <main class="sigso-contenido">
    <div id="contenedor-stepper"></div>

    <form id="form-solicitud" class="sigso-card" novalidate>
      <h1>Nueva solicitud</h1>

      <!-- Paso 1: Contexto general -- lo minimo compartido por toda la
           solicitud. Modulo/tipo NO van aqui: cada item puede vivir en un
           modulo distinto y ser de un tipo distinto (Fase 10, rediseno UX). -->
      <section id="paso-contexto">
        <!-- P1 (v2.0, Sprint 1): formulario de dos velocidades -- "Rápido"
             pide solo lo minimo (tipo, módulo, título, qué pasa, evidencia);
             "Completo" muestra ademas contexto, impacto, acceso y demas
             campos opcionales. Rápido es el modo por defecto (RF-201/202). -->
        <div class="sigso-campo">
          <label>¿Cómo quieres cargar tu solicitud?</label>
          <div class="sigso-chips" id="selector-modo">
            <button type="button" class="sigso-chip" data-modo="rapido">Rápido</button>
            <button type="button" class="sigso-chip" data-modo="completo">Completo</button>
          </div>
          <p class="sigso-ayuda">Rápido: lo justo para dejar tu pedido registrado. Completo: agrega contexto, acceso y más detalle por item.</p>
        </div>

        <div class="sigso-campo">
          <label for="campo-empresa">Empresa</label>
          <select id="campo-empresa" required></select>
        </div>

        <div class="sigso-campo">
          <label for="campo-plataforma">Plataforma</label>
          <select id="campo-plataforma" required></select>
        </div>

        <div class="sigso-campo">
          <label class="sigso-toggle">
            <input type="checkbox" id="campo-es-cliente" />
            &iquest;Es una solicitud de cliente?
          </label>
        </div>

        <div class="sigso-bloque-cliente" id="bloque-cliente">
          <div class="sigso-campo">
            <label for="campo-empresa-cliente">Empresa cliente</label>
            <input type="text" id="campo-empresa-cliente" />
          </div>
          <div class="sigso-campo">
            <label for="campo-cliente-mandante">Mandante (opcional)</label>
            <input type="text" id="campo-cliente-mandante" />
          </div>
          <div class="sigso-campo">
            <label for="campo-cliente-obra">Obra/Proyecto (opcional)</label>
            <input type="text" id="campo-cliente-obra" />
          </div>
          <div class="sigso-campo">
            <label for="campo-contacto-cliente">Nombre de contacto</label>
            <input type="text" id="campo-contacto-cliente" />
          </div>
          <div class="sigso-campo">
            <label for="campo-correo-cliente">Correo del cliente</label>
            <input type="email" id="campo-correo-cliente" />
          </div>
          <div class="sigso-campo">
            <label for="campo-telefono-cliente">Tel&eacute;fono de contacto (opcional)</label>
            <input type="tel" id="campo-telefono-cliente" placeholder="+569XXXXXXXX" />
          </div>
          <div class="sigso-campo">
            <label for="campo-urgencia-cliente">Urgencia reportada por el cliente</label>
            <select id="campo-urgencia-cliente">
              <option value="">No especificada</option>
              <option value="Alta">Alta</option>
              <option value="Normal">Normal</option>
              <option value="Baja">Baja</option>
            </select>
          </div>
        </div>

        <div class="sigso-campo">
          <label for="campo-solicitante-nombre">Tu nombre</label>
          <input type="text" id="campo-solicitante-nombre" required />
        </div>

        <div class="sigso-campo">
          <label for="campo-solicitante-cargo">Tu cargo</label>
          <input type="text" id="campo-solicitante-cargo" required />
        </div>

        <div class="sigso-campo">
          <label for="campo-solicitante-email">Tu correo</label>
          <input type="email" id="campo-solicitante-email" required />
        </div>

        <div class="sigso-campo">
          <label for="campo-cc">Copiar a (CC, opcional)</label>
          <input type="email" id="campo-cc" placeholder="otro.correo@empresa.cl" />
        </div>

        <div class="sigso-campo" id="fila-avisar-leo">
          <label class="sigso-toggle">
            <input type="checkbox" id="campo-avisar-leo" />
            Avisar al equipo de desarrollo por correo
          </label>
          <p class="sigso-ayuda" id="nota-avisar-leo-cliente" style="display:none">
            Las solicitudes de cliente se avisan al equipo autom&aacute;ticamente.
          </p>
        </div>

        <div id="alerta-paso1"></div>
        <div class="sigso-campo">
          <button type="button" class="sigso-boton" id="btn-paso1-siguiente">Continuar &rarr;</button>
        </div>
      </section>

      <!-- Paso 2: los items -- el corazon del formulario. Cada item es una
           mini "hoja de ruta": tipo, modulo, que pasa/que deberia pasar,
           evidencia con descripcion propia. -->
      <section id="paso-items" class="sigso-oculto">
        <h2>Que necesitas pedir</h2>
        <div id="lista-subsolicitudes"></div>
        <button type="button" class="sigso-boton--secundario" id="btn-agregar-subsolicitud">+ Agregar otro item</button>

        <div id="alerta-paso2"></div>
        <div class="sigso-campo" style="margin-top: 1.5rem">
          <button type="button" class="sigso-boton--secundario" id="btn-paso2-atras">&larr; Atr&aacute;s</button>
          <button type="button" class="sigso-boton" id="btn-paso2-siguiente">Revisar y enviar &rarr;</button>
        </div>
      </section>

      <!-- Paso 3: revision final antes de enviar. -->
      <section id="paso-revision" class="sigso-oculto">
        <h2>Revisa antes de enviar</h2>
        <div id="contenedor-revision"></div>

        <div id="contenedor-fecha-propuesta" style="margin-top: 1.5rem"></div>

        <div class="sigso-campo" style="margin-top: 1.5rem">
          <label for="campo-observaciones-generales">Observaciones generales (opcional)</label>
          <textarea id="campo-observaciones-generales"></textarea>
        </div>

        <div class="sigso-campo">
          <button type="button" class="sigso-boton--secundario" id="btn-paso3-atras">&larr; Editar</button>
          <button type="submit" class="sigso-boton" id="btn-enviar">Enviar solicitud</button>
        </div>
      </section>
    </form>

    <div id="resultado" class="sigso-card sigso-oculto"></div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui-components.js"></script>
  <script src="js/components.js"></script>
  <script src="js/formulario.js"></script>
</body>
</html>
