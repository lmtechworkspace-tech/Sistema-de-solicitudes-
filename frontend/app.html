<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIGSO — Backoffice</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <header id="sigso-header" class="sigso-header"></header>

  <main class="sigso-contenido" style="max-width: 1100px">
    <section id="vista-dashboard">
      <h1>Dashboard</h1>

      <div class="sigso-filtros">
        <div class="sigso-campo">
          <label for="filtro-empresa">Empresa</label>
          <select id="filtro-empresa"><option value="">Todas</option></select>
        </div>
        <div class="sigso-campo">
          <label for="filtro-estado">Estado</label>
          <select id="filtro-estado"><option value="">Todos</option></select>
        </div>
        <div class="sigso-campo">
          <label for="filtro-prioridad">Prioridad</label>
          <select id="filtro-prioridad">
            <option value="">Todas</option>
            <option value="P1">P1</option><option value="P2">P2</option><option value="P3">P3</option>
            <option value="P4">P4</option><option value="P5">P5</option>
          </select>
        </div>
        <div class="sigso-campo">
          <label for="filtro-agrupar">Agrupar</label>
          <select id="filtro-agrupar">
            <option value="">Sin agrupar</option>
            <option value="estado_derivado">Por estado</option>
            <option value="prioridad_derivada">Por prioridad</option>
          </select>
        </div>
        <div class="sigso-campo">
          <button type="button" class="sigso-boton" id="btn-actualizar-dashboard">Actualizar</button>
        </div>
      </div>

      <div class="sigso-kpis">
        <div class="sigso-kpi"><div class="sigso-kpi__valor" id="kpi-abiertas">—</div><div class="sigso-kpi__etiqueta">Abiertas</div></div>
        <div class="sigso-kpi sigso-kpi--alerta"><div class="sigso-kpi__valor" id="kpi-criticas">—</div><div class="sigso-kpi__etiqueta">Criticas activas</div></div>
        <div class="sigso-kpi sigso-kpi--alerta"><div class="sigso-kpi__valor" id="kpi-sla-vencido">—</div><div class="sigso-kpi__etiqueta">SLA vencido</div></div>
        <div class="sigso-kpi"><div class="sigso-kpi__valor" id="kpi-del-dia">—</div><div class="sigso-kpi__etiqueta">Del dia</div></div>
      </div>

      <div class="sigso-graficos">
        <div class="sigso-card sigso-grafico-card"><h3>Por estado</h3><canvas id="grafico-estado"></canvas></div>
        <div class="sigso-card sigso-grafico-card"><h3>Por prioridad</h3><canvas id="grafico-prioridad"></canvas></div>
        <div class="sigso-card sigso-grafico-card"><h3>Por empresa</h3><canvas id="grafico-empresa"></canvas></div>
      </div>

      <div class="sigso-card">
        <h3>Solicitudes recientes</h3>
        <div id="lista-recientes"></div>
      </div>
    </section>

    <section id="vista-detalle" class="sigso-oculto">
      <button type="button" class="sigso-boton--secundario" id="btn-volver-dashboard">&larr; Volver al dashboard</button>
      <div id="detalle-contenido"></div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui-components.js"></script>
  <script src="js/components.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/detalle.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
