<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIGSO — Administración</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <header id="sigso-header" class="sigso-header"></header>

  <main class="sigso-contenido" style="max-width: 1100px; display: flex; gap: 1.5rem;">

      <button type="button" class="sigso-admin-menu__item" data-tipo="EMPRESA">Empresas</button>
      <button type="button" class="sigso-admin-menu__item" data-tipo="PLATAFORMA">Plataformas</button>
      <button type="button" class="sigso-admin-menu__item" data-tipo="MODULO">Módulos</button>
      <button type="button" class="sigso-admin-menu__item" data-tipo="TIPO">Tipos de solicitud</button>
      <button type="button" class="sigso-admin-menu__item" data-tipo="USUARIOS">Usuarios</button>
      <button type="button" class="sigso-admin-menu__item" data-tipo="LOGS">Automatizaciones</button>
    </nav>

    <section id="admin-contenido" style="flex: 1"></section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui-components.js"></script>
  <script src="js/admin.js"></script>

</html>
