<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIGSO — Administración</title>
  <!-- v4.0: la marca declara Inter desde §12.3 pero nunca se cargaba: todos
       veian la fuente por defecto del sistema. display=swap evita el bloqueo
       de render. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <header id="sigso-header" class="sigso-header"></header>

  <main class="sigso-contenido sigso-admin-layout" style="max-width: 1100px;">
    <nav class="sigso-admin-menu" id="admin-menu">
      <button type="button" class="sigso-admin-menu__item" data-tipo="EMPRESA">Empresas</button>
      <button type="button" class="sigso-admin-menu__item" data-tipo="PLATAFORMA">Plataformas</button>
      <button type="button" class="sigso-admin-menu__item" data-tipo="MODULO">Módulos</button>
      <button type="button" class="sigso-admin-menu__item" data-tipo="TIPO">Tipos de solicitud</button>
      <button type="button" class="sigso-admin-menu__item" data-tipo="AREA">Áreas / responsables</button>
      <button type="button" class="sigso-admin-menu__item" data-tipo="NOTIFICACION">Notificaciones</button>
      <button type="button" class="sigso-admin-menu__item" data-tipo="USUARIOS">Usuarios</button>
      <button type="button" class="sigso-admin-menu__item" data-tipo="CUENTAS_PORTAL">Cuentas plataforma</button>
      <button type="button" class="sigso-admin-menu__item" data-tipo="LOGS">Automatizaciones</button>
    </nav>

    <section id="admin-contenido" class="sigso-admin-contenido"></section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui-components.js"></script>
  <script src="js/components.js"></script>
  <script src="js/iconos.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
